<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>퍼스널 PMU 스타일 찾기</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #F9F5F0;
    --blush: #E8D5CC;
    --rose: #C4907A;
    --deep-rose: #9B6355;
    --charcoal: #2C2420;
    --muted: #8C7B74;
    --white: #FFFFFF;
    --border: #DDD0C8;
    --accent: #B87A68;
  }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--cream);
    color: var(--charcoal);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
  }

  .quiz-wrap {
    width: 100%;
    max-width: 560px;
  }

  /* INTRO */
  .intro {
    text-align: center;
    padding: 3rem 2rem;
    background: var(--white);
    border: 1px solid var(--border);
  }

  .intro-eyebrow {
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 300;
    font-size: 11px;
    letter-spacing: 0.25em;
    color: var(--rose);
    text-transform: uppercase;
    margin-bottom: 1.5rem;
  }

  .intro-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.4rem;
    font-weight: 300;
    line-height: 1.25;
    color: var(--charcoal);
    margin-bottom: 1rem;
    font-style: italic;
  }

  .intro-desc {
    font-size: 13.5px;
    font-weight: 300;
    color: var(--muted);
    line-height: 1.9;
    margin-bottom: 2.5rem;
    max-width: 380px;
    margin-left: auto;
    margin-right: auto;
  }

  .btn-start {
    display: inline-block;
    background: var(--charcoal);
    color: var(--cream);
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 400;
    font-size: 13px;
    letter-spacing: 0.1em;
    padding: 14px 40px;
    border: none;
    cursor: pointer;
    transition: background 0.2s, transform 0.15s;
  }

  .btn-start:hover { background: var(--deep-rose); transform: translateY(-1px); }
  .btn-start:active { transform: translateY(0); }

  /* PROGRESS */
  .progress-bar {
    height: 2px;
    background: var(--border);
    margin-bottom: 0;
  }

  .progress-fill {
    height: 100%;
    background: var(--rose);
    transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  }

  /* QUESTION */
  .question-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-top: none;
    padding: 2.5rem 2.5rem 2rem;
  }

  .q-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1.75rem;
  }

  .q-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 13px;
    font-weight: 400;
    color: var(--rose);
    letter-spacing: 0.1em;
  }

  .q-count {
    font-size: 11px;
    font-weight: 300;
    color: var(--muted);
    letter-spacing: 0.05em;
  }

  .q-text {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 16px;
    font-weight: 400;
    line-height: 1.7;
    color: var(--charcoal);
    margin-bottom: 2rem;
  }

  /* OPTIONS */
  .options { display: flex; flex-direction: column; gap: 10px; }

  .option-btn {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    background: transparent;
    border: 1px solid var(--border);
    padding: 16px 18px;
    cursor: pointer;
    text-align: left;
    transition: border-color 0.2s, background 0.2s;
    width: 100%;
    font-family: 'Noto Sans KR', sans-serif;
  }

  .option-btn:hover { border-color: var(--rose); background: #FDF8F5; }

  .option-btn.selected {
    border-color: var(--rose);
    background: #FDF1EC;
  }

  .opt-label {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 24px;
    height: 24px;
    min-width: 24px;
    border: 1px solid var(--border);
    font-family: 'Cormorant Garamond', serif;
    font-size: 13px;
    font-weight: 400;
    color: var(--muted);
    transition: background 0.2s, color 0.2s, border-color 0.2s;
    margin-top: 1px;
  }

  .option-btn.selected .opt-label {
    background: var(--rose);
    border-color: var(--rose);
    color: var(--white);
  }

  .opt-text {
    font-size: 13.5px;
    font-weight: 300;
    color: var(--charcoal);
    line-height: 1.65;
  }

  /* NAV */
  .q-nav {
    display: flex;
    justify-content: flex-end;
    padding: 1.25rem 2.5rem 1.5rem;
    background: var(--white);
    border: 1px solid var(--border);
    border-top: 1px solid var(--border);
    margin-top: -1px;
  }

  .btn-next {
    background: var(--charcoal);
    color: var(--cream);
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 400;
    font-size: 13px;
    letter-spacing: 0.08em;
    padding: 12px 30px;
    border: none;
    cursor: pointer;
    transition: background 0.2s, opacity 0.2s;
    opacity: 0.35;
    pointer-events: none;
  }

  .btn-next.active { opacity: 1; pointer-events: all; }
  .btn-next.active:hover { background: var(--deep-rose); }

  /* RESULT */
  .result-card {
    background: var(--white);
    border: 1px solid var(--border);
    overflow: hidden;
  }

  .result-header {
    background: var(--charcoal);
    padding: 2.5rem 2.5rem 2rem;
    text-align: center;
  }

  .result-eyebrow {
    font-size: 10px;
    font-weight: 300;
    letter-spacing: 0.25em;
    color: var(--blush);
    text-transform: uppercase;
    margin-bottom: 1rem;
  }

  .result-type {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.8rem;
    font-weight: 300;
    font-style: italic;
    color: var(--cream);
    line-height: 1.1;
    margin-bottom: 0.5rem;
  }

  .result-sub {
    font-size: 12px;
    font-weight: 300;
    color: var(--blush);
    letter-spacing: 0.1em;
  }

  .result-body { padding: 2.5rem; }

  .result-desc {
    font-size: 14px;
    font-weight: 300;
    line-height: 1.9;
    color: var(--charcoal);
    margin-bottom: 2rem;
    padding-bottom: 2rem;
    border-bottom: 1px solid var(--border);
  }

  .recommend-label {
    font-size: 10px;
    font-weight: 400;
    letter-spacing: 0.2em;
    color: var(--rose);
    text-transform: uppercase;
    margin-bottom: 1rem;
  }

  .recommend-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 2rem; }

  .recommend-item {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13.5px;
    font-weight: 300;
    color: var(--charcoal);
  }

  .rec-dot {
    width: 5px;
    height: 5px;
    min-width: 5px;
    background: var(--rose);
    border-radius: 50%;
  }

  .btn-retry {
    width: 100%;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 300;
    font-size: 13px;
    letter-spacing: 0.08em;
    padding: 14px;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
    margin-bottom: 10px;
  }

  .btn-retry:hover { border-color: var(--rose); color: var(--deep-rose); }

  .btn-consult {
    width: 100%;
    background: var(--rose);
    border: none;
    color: var(--white);
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 400;
    font-size: 13px;
    letter-spacing: 0.1em;
    padding: 16px;
    cursor: pointer;
    transition: background 0.2s;
  }

  .btn-consult:hover { background: var(--deep-rose); }

  /* ANIMATIONS */
  .fade-in { animation: fadeIn 0.4s ease forwards; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .hidden { display: none !important; }

  @media (max-width: 480px) {
    .intro-title { font-size: 2rem; }
    .question-card, .q-nav, .result-body { padding-left: 1.5rem; padding-right: 1.5rem; }
    .result-header { padding: 2rem 1.5rem 1.75rem; }
  }
</style>
</head>
<body>

<div class="quiz-wrap" id="quizWrap">

  <!-- INTRO -->
  <div id="intro" class="intro fade-in">
    <p class="intro-eyebrow">Personal PMU Test</p>
    <h1 class="intro-title">나의 퍼스널<br>PMU 스타일은?</h1>
    <p class="intro-desc">3가지 질문에 답하면<br>나에게 꼭 맞는 반영구 시술 스타일과<br>전문 아티스트를 추천해 드립니다.</p>
    <button class="btn-start" onclick="startQuiz()">테스트 시작하기</button>
  </div>

  <!-- QUIZ -->
  <div id="quiz" class="hidden">
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill" style="width: 0%"></div>
    </div>
    <div class="question-card" id="questionCard"></div>
    <div class="q-nav">
      <button class="btn-next" id="btnNext" onclick="nextQuestion()">다음 질문 →</button>
    </div>
  </div>

  <!-- RESULT -->
  <div id="result" class="hidden result-card fade-in"></div>

</div>

<script>
const questions = [
  {
    text: "평소 메이크업 스타일은 어떤가요?",
    options: [
      { label: "A", text: "화장한 듯 안 한 듯 자연스러운 '꾸안꾸'", value: "A" },
      { label: "B", text: "또렷하고 세련된 '아이돌 메이크업'", value: "B" },
      { label: "C", text: "결점은 가리고 본연의 이목구비를 강조하는 '클래식'", value: "C" }
    ]
  },
  {
    text: "시술을 고민하는 가장 큰 이유는 무엇인가요?",
    options: [
      { label: "A", text: "바쁜 아침, 화장 시간을 단축하고 싶어서", value: "A" },
      { label: "B", text: "얼굴의 비대칭이나 콤플렉스를 보완하고 싶어서", value: "B" },
      { label: "C", text: "나만의 분위기를 확 바꾸고 싶어서", value: "C" }
    ]
  },
  {
    text: "선호하는 색감은 어느 쪽에 가까운가요?",
    options: [
      { label: "A", text: "내 피부 톤과 하나 된 듯한 은은한 브라운", value: "A" },
      { label: "B", text: "확실하게 눈매를 살려주는 깊이감 있는 블랙/다크 브라운", value: "B" },
      { label: "C", text: "생기를 더해주는 화사한 컬러감", value: "C" }
    ]
  }
];

const results = {
  A: {
    type: "Natural",
    sub: "자연스러운 꾸안꾸 스타일",
    desc: "일상에 자연스럽게 녹아드는 스타일을 추구하시는군요. 피부 톤과 조화를 이루는 은은한 컬러로, 화장한 듯 안 한 듯 완성되는 반영구 시술이 잘 어울립니다. 아침 루틴을 간소화하면서도 늘 생기있어 보이는 인상을 만들어 드립니다.",
    recommends: ["결 눈썹 (헤어 스트로크)", "아쿠아 립 블러쉬", "내추럴 아이라인", "피부 속광 앰플 베이스"]
  },
  B: {
    type: "Defined",
    sub: "또렷하고 세련된 아이돌 스타일",
    desc: "선명하고 또렷한 인상으로 존재감을 표현하고 싶으신 분이네요. 비대칭 교정과 음영 테크닉을 통해 이목구비를 또렷하게 살리는 시술을 추천드립니다. 전문 아티스트가 얼굴형에 맞는 1:1 맞춤 디자인으로 완성해 드립니다.",
    recommends: ["섀도우 브로우 (그라데이션)", "세미 퍼머넌트 아이라인", "버밀리온 보더 립", "비대칭 교정 눈썹"]
  },
  C: {
    type: "Classic",
    sub: "우아하고 클래식한 스타일",
    desc: "본연의 아름다움을 극대화하면서도 분위기 있는 변화를 원하시는 스타일이에요. 클래식한 컬러감으로 얼굴의 골격과 피부 결을 살리는 시술이 잘 어울립니다. 시간이 지나도 세련미를 잃지 않는 지속력 높은 디자인을 추천드립니다.",
    recommends: ["컴비네이션 눈썹 (엠보+섀딩)", "풀 컬러 립 (딥 로즈/마호가니)", "언더라인 아이라인", "페이스 컨투어링"]
  }
};

let currentQ = 0;
let answers = [];
let selectedOption = null;

function startQuiz() {
  document.getElementById('intro').classList.add('hidden');
  document.getElementById('quiz').classList.remove('hidden');
  renderQuestion();
}

function renderQuestion() {
  const q = questions[currentQ];
  const progress = ((currentQ) / questions.length) * 100;
  document.getElementById('progressFill').style.width = progress + '%';

  const card = document.getElementById('questionCard');
  card.classList.remove('fade-in');
  void card.offsetWidth;
  card.classList.add('fade-in');

  selectedOption = null;
  const nextBtn = document.getElementById('btnNext');
  nextBtn.classList.remove('active');
  nextBtn.textContent = currentQ < questions.length - 1 ? '다음 질문 →' : '결과 보기 →';

  card.innerHTML = `
    <div class="q-meta">
      <span class="q-num">Q${currentQ + 1}</span>
      <span class="q-count">${currentQ + 1} / ${questions.length}</span>
    </div>
    <p class="q-text">${q.text}</p>
    <div class="options">
      ${q.options.map((opt, i) => `
        <button class="option-btn" onclick="selectOption(this, '${opt.value}')">
          <span class="opt-label">${opt.label}</span>
          <span class="opt-text">${opt.text}</span>
        </button>
      `).join('')}
    </div>
  `;
}

function selectOption(el, value) {
  document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
  selectedOption = value;
  document.getElementById('btnNext').classList.add('active');
}

function nextQuestion() {
  if (!selectedOption) return;
  answers.push(selectedOption);

  if (currentQ < questions.length - 1) {
    currentQ++;
    renderQuestion();
  } else {
    showResult();
  }
}

function showResult() {
  const count = { A: 0, B: 0, C: 0 };
  answers.forEach(a => count[a]++);
  const top = Object.entries(count).sort((a, b) => b[1] - a[1])[0][0];
  const r = results[top];

  document.getElementById('quiz').classList.add('hidden');
  const resultEl = document.getElementById('result');
  resultEl.classList.remove('hidden');
  resultEl.classList.remove('fade-in');
  void resultEl.offsetWidth;
  resultEl.classList.add('fade-in');

  document.getElementById('progressFill').style.width = '100%';

  resultEl.innerHTML = `
    <div class="result-header">
      <p class="result-eyebrow">Your PMU Style</p>
      <h2 class="result-type">${r.type}</h2>
      <p class="result-sub">${r.sub}</p>
    </div>
    <div class="result-body">
      <p class="result-desc">${r.desc}</p>
      <p class="recommend-label">Recommended Treatments</p>
      <div class="recommend-list">
        ${r.recommends.map(item => `
          <div class="recommend-item">
            <span class="rec-dot"></span>
            <span>${item}</span>
          </div>
        `).join('')}
      </div>
      <button class="btn-consult" onclick="alert('상담 문의 기능을 연결해 주세요.')">전문 아티스트 상담 예약하기</button>
      <button class="btn-retry" onclick="resetQuiz()">테스트 다시 하기</button>
    </div>
  `;
}

function resetQuiz() {
  currentQ = 0;
  answers = [];
  selectedOption = null;
  document.getElementById('result').classList.add('hidden');
  document.getElementById('quiz').classList.remove('hidden');
  document.getElementById('progressFill').style.width = '0%';
  renderQuestion();
}
</script>
</body>
</html>
